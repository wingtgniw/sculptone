name: CI

on:
  push:
    branches: [main]
  pull_request:

# 최소 권한: 소스 읽기만 허용
permissions:
  contents: read

# 같은 ref에 새 푸시가 오면 진행 중이던 실행을 취소(중복 빌드 방지).
# 단, main은 모든 커밋이 CI 결과를 갖도록 취소하지 않고 PR에서만 취소.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    # 폭주 방지: 어떤 단계가 멈춰도 15분 내 실패 처리(기본 360분 낭비 차단)
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm을 setup-node보다 먼저 설치해야 pnpm 스토어 캐시가 동작한다.
      # 버전은 root package.json의 packageManager 필드에서 읽는다.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      # 커버리지 실행은 테스트 실행 + 임계값 게이트를 겸한다(이중 실행 방지)
      - name: Test & coverage
        run: pnpm -r coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          # node_modules/심링크 순회를 피하려 커버리지 디렉터리를 명시 한정
          path: |
            packages/*/coverage/
            apps/web/coverage/
          if-no-files-found: ignore
          retention-days: 14

      - name: Build
        run: pnpm -r build
